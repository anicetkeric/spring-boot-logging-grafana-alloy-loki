#      - ./data/logs:/app/logs
#    networks:
#      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki-storage:/loki
    healthcheck:
      test: wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q -w ready || exit 1
      interval: 5s
      timeout: 1s
      retries: 10
    networks:
      - loki

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "12345:12345"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./logs:/var/log/spring
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy
    networks:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 5s
      timeout: 1s
      retries: 10
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/grafana-datasource.yml:/etc/grafana/provisioning/datasources/grafana-datasource.yml
      - grafana-storage:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - loki

#  prometheus:
#    image: prom/prometheus:v2.47.0
#    command:
#      - --web.enable-remote-write-receiver
#      - --config.file=/etc/prometheus/prometheus.yml
#    ports:
#      - "9090:9090"




volumes:
  loki-storage:
  grafana-storage:
    driver: local

networks:
  loki:
    driver: bridge
